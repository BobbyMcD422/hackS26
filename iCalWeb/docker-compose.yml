services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: icalweb-backend
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend/icalweb
      dockerfile: Dockerfile
    container_name: icalweb-frontend
    working_dir: /app
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/icalweb:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
