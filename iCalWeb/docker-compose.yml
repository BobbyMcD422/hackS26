services:
  icalweb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: icalweb
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/icalweb:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
